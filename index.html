<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Thumb Fighter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stage" class="stage">
    <div id="player1" class="player-area player1" data-player="1" aria-label="Player 1 area">
      <div class="player-hud">
        <div class="hp-counter" id="hp1">HP: 10</div>
        <div class="hp-counter" id="hp2dbg"></div>
        <div class="round-counter" id="rounds1">
          <span class="round-text">Round 1</span>
          <div class="flags" id="flags1"></div>
        </div>
      </div>
      <div class="debug-info" id="debug1"></div>
      <div class="character-zone">
        <div class="character" id="char1">
          <div class="sprite" id="sprite1">[SPRITE]</div>
        </div>
      </div>
      <div class="controls">
        <button class="punch-btn left" data-player="1" data-action="left" aria-label="Player 1 left punch">L</button>
        <button class="punch-btn right" data-player="1" data-action="right" aria-label="Player 1 right punch">R</button>
      </div>
    </div>

    <div id="player2" class="player-area player2" data-player="2" aria-label="Player 2 area">
      <div class="player-hud">
        <div class="hp-counter" id="hp2">HP: 10</div>
        <div class="round-counter" id="rounds2">
          <span class="round-text">Round 1</span>
          <div class="flags" id="flags2"></div>
        </div>
      </div>
      <div class="debug-info" id="debug2"></div>
      <div class="character-zone">
        <div class="character" id="char2">
          <div class="sprite" id="sprite2">[SPRITE]</div>
        </div>
      </div>
      <div class="controls">
        <button class="punch-btn left" data-player="2" data-action="left" aria-label="Player 2 left punch">L</button>
        <button class="punch-btn right" data-player="2" data-action="right" aria-label="Player 2 right punch">R</button>
      </div>
    </div>

    <div id="overlay" class="overlay hidden" aria-live="polite"></div>
    <div id="rotateOverlay" class="rotate-overlay hidden">Rotate your device to portrait</div>
  </div>

  <div id="consoleMirrorWrap" style="position:fixed;bottom:0;left:0;width:100vw;z-index:200;pointer-events:none;">
    <textarea id="consoleMirror" readonly style="width:100vw;min-height:80px;max-height:30vh;resize:vertical;background:#222;color:#fff;font-family:monospace;font-size:13px;opacity:0.95;pointer-events:none;user-select:none;outline:none;border:none;padding:4px 60px 4px 4px;box-sizing:border-box;">Console output will appear here...</textarea>
    <button id="copyConsoleBtn" style="position:absolute;top:8px;right:12px;z-index:10;font-size:13px;padding:2px 10px;pointer-events:auto;cursor:pointer;">Copy</button>
  </div>
  <script type="module" src="js/main.js"></script>
  <script src="js/console-mirror.js"></script>
</body>
</html>
