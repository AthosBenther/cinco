<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Thumb Fighter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stage" class="stage">
    <div id="player1" class="player-area player1" data-player="1" aria-label="Player 1 area">
      <div class="player-hud">
        <div class="hp-counter" id="hp1">HP: 10</div>
        <div class="round-counter" id="rounds1">Round 1 | Wins: 0</div>
      </div>
      <div class="character-zone">
        <div class="character" id="char1">
          <div class="sprite" id="sprite1">[SPRITE]</div>
        </div>
      </div>
      <div class="controls">
        <button class="punch-btn left" data-player="1" data-action="left" aria-label="Player 1 left punch">L</button>
        <button class="punch-btn right" data-player="1" data-action="right" aria-label="Player 1 right punch">R</button>
      </div>
    </div>

    <div id="player2" class="player-area player2" data-player="2" aria-label="Player 2 area">
      <div class="player-hud">
        <div class="hp-counter" id="hp2">HP: 10</div>
        <div class="round-counter" id="rounds2">Round 1 | Wins: 0</div>
      </div>
      <div class="character-zone">
        <div class="character" id="char2">
          <div class="sprite" id="sprite2">[SPRITE]</div>
        </div>
      </div>
      <div class="controls">
        <button class="punch-btn left" data-player="2" data-action="left" aria-label="Player 2 left punch">L</button>
        <button class="punch-btn right" data-player="2" data-action="right" aria-label="Player 2 right punch">R</button>
      </div>
    </div>

    <div id="overlay" class="overlay hidden" aria-live="polite"></div>
    <div id="rotateOverlay" class="rotate-overlay hidden">Rotate your device to portrait</div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
